{% set version = "0.2.1" %}

package:
  name: jinja-lsp
  version: {{ version }}

source:
  url: https://github.com/uros-5/jinja-lsp/archive/v{{ version }}.tar.gz
  sha256: 9371b063136044dac66a46d9b6d51272aec8c449da4dbc40bf7397d37d813daa

build:
  number: 0
  skip: true  # [ppc64le]

requirements:
  build:
    - {{ compiler('rust') }}
    - {{ compiler('c') }}
    - {{ stdlib('c') }}
    - cargo-bundle-licenses

test:
  commands:
    - jinja-lsp &  # [not win]
    - exe_pid=$!  # [not win]
    - trap "kill -SIGTERM ${exe_pid}" SIGTERM  # [not win]
    - start /b jinja-lsp   # [win]
    - if %errorlevel% neq 0 exit %errorlevel%  # [win]
    - taskkill /F /im jinja-lsp.exe  # [win]
    - if %errorlevel% neq 0 exit %errorlevel%  # [win]

about:
  home: https://github.com/uros-5/jinja-lsp
  license: MIT
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  summary: Language Server for jinja
  dev_url: https://github.com/uros-5/jinja-lsp

extra:
  recipe-maintainers:
    - danielnachun
